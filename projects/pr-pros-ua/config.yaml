# Проєкт: pr-pros-ua / Valera
# Щоб зробити цей проєкт активним: встановіть active_project: pr-pros-ua у viral-factory.config.yaml

niche:
  slug: pr-pros-ua
  keywords:
    - "піар агенція"
    - "PR менеджер робота"
    - "як піарити бренд"
    - "піар для бізнесу"
    - "криза в піарі"
    - "робота піарника"
    - "штучний інтелект в маркетингу"
    - "AI співробітник"
  accounts:            # TBD — підтвердити/доповнити реальними хендлами; discover-niche допоможе знайти
    - "@TBD_ua_pr_agency"
    - "@TBD_ua_smm"
  shop_queries:        # проксі-монетизація: інфо-продукти суміжної ніші в TikTok Shop
    - "курс з піару"
    - "книга про маркетинг"
    - "PR курс українською"

thresholds:
  min_views: 10000     # знижено: україномовна ніша тонша за обсягом
  min_comments: 100
  min_outlier: 5

product:
  name: Valera
  slug: valera
  one_demo_feature: >
    У Slack прилітає згадка бренду клієнта в треді. Valera за секунди класифікує її
    (рутина чи виняток для людини), генерує чернетку відповіді/міні-релізу, адаптовану
    під ринок і мову клієнта, і пінгує людину лише якщо є ризик або межа повноважень.
  brand_voice: >
    Як колега-PR-щик, а не SaaS-компанія і не чат-бот. Чесно про межі: Valera тягне
    обсяг (моніторинг, драфти, звіти, нічні зміни), але не веде стратегію й не замінює
    стосунки з журналістами. Говори конкретикою (24/7, кожною мовою, кожен пояс).
    Уникай слів "оптимізувати", "синергія", "leverage".
  screen_record_path: "assets/valera-demo.mp4"   # placeholder для /recreate-video

audience:
  portrait: >
    Власники й керівники PR-агенцій та PR-менеджери, які тонуть у рутині: моніторинг
    згадок по різних ринках і мовах, нічні зміни, вхідні від преси в усіх поясах,
    ручні чернетки релізів і звіти. Втомлені від обсягу механічної роботи, бояться
    щось пропустити, поки команда спить. Хочуть масштабуватись без найму ще людей.
  slang:               # стартовий набір; comment-miner розширить реальними фразами
    - "пітч"
    - "реліз"
    - "фоллоу-ап"
    - "інфопривід"
    - "охоплення"
    - "згадки"
    - "медіаплан"
    - "ToV"
    - "вигоряння"
