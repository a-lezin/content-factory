# Проєкт: ai-accountant
# Щоб зробити цей проєкт активним: встановіть active_project: ai-accountant у viral-factory.config.yaml
# TODO: заповніть поля перед запуском /discover-niche

niche:
  slug: ai-accountant
  keywords:
    - "AI бухгалтер"
    - "автоматизація бухгалтерії"
    - "бухгалтерія для ФОП"
    - "штучний інтелект фінанси"
    - "автоматизація звітності"
    - "бухгалтер онлайн"
  accounts: []           # TODO: додати хендли конкурентів після ресерчу
  shop_queries:
    - "бухгалтерська програма"
    - "онлайн бухгалтерія"

thresholds:
  min_views: 10000
  min_comments: 50
  min_outlier: 5

product:
  name: ФінАІ
  slug: ai-accountant
  one_demo_feature: >
    Власник ФОП фотографує чек або завантажує виписку з банку. ФінАІ за 5 секунд
    класифікує операцію (дохід/витрата/транзит), визначає групу єдиного податку,
    розраховує суму авансового внеску і одразу показує: "Ваш поточний ЄП за квартал —
    X грн, звіт готовий до підпису." Без бухгалтера. Без Excel. Без страху помилитись.
  brand_voice: >
    Як розумний знайомий бухгалтер, а не держрегулятор і не корпоративне SaaS.
    Говорить мовою ФОПа: "скільки платити", "коли подати", "чи не штрафнуть".
    Словник: "здача", "квитанція", "четвертий квартал", "спрощена система",
    "без геморою", "просто сфоткай". Уникати: "автоматизація процесів",
    "compliance-рішення", "ERP-інтеграція".
  screen_record_path: "assets/ai-accountant-demo.mp4"

audience:
  portrait: >
    ФОПи (1–3 група) та власники мікробізнесу до 5 осіб в Україні. Не мають
    постійного бухгалтера — або не можуть собі дозволити (3000–5000 грн/міс),
    або не довіряють. Паряться зі звітністю раз на квартал, бояться штрафів і
    перевірок, не розуміють де межа між витратами і доходом. Типовий тригер:
    "бухгалтер сказала, що мені зробила звіт — але я не розумію звідки цифри".
    Хочуть "просто знати скільки платити і не думати про це".
  slang:
    - "звітність"
    - "ФОП"
    - "єдиний податок"
    - "ЄП"
    - "авансовий внесок"
    - "бухгалтер коштує дорого"
    - "спрощена система"
    - "штраф від податкової"
    - "4 група"
    - "декларація"
    - "виписка"
